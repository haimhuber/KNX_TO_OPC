<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ABB KNX Dashboard</title>
    <style>
      :root{--abb-red:#ff000f;--abb-dark:#0b1720;--muted:#6b7280}
      body{margin:0;font-family:Arial, Helvetica, sans-serif;background:linear-gradient(180deg,#0f1720,#071021);color:#e5e7eb}
      .app-header{background:linear-gradient(135deg,#111,#2a2a2a);padding:20px 36px}
      .header-content{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
      h1{margin:0;color:var(--abb-red);font-size:24px}
      .container{max-width:1200px;margin:28px auto;padding:0 20px}
      .card{background:#ffffff;border-radius:12px;padding:18px;color:#0b1720}
      table{width:100%;border-collapse:collapse}
      th,td{padding:10px;border-bottom:1px solid #eef3f8;text-align:right}
      th{background:#fff7f7}
      .status-ok{color:green;font-weight:700}
      .status-err{color:var(--abb-red);font-weight:700}
      .actions{display:flex;gap:8px}
      button{background:var(--abb-red);color:#fff;border:none;padding:8px 12px;border-radius:8px}
    </style>
  </head>
  <body>
    <header class="app-header">
      <div class="header-content">
        <div>
          <div style="font-size:13px;letter-spacing:2px;font-weight:700;color:#fff;opacity:0.9">ABB STYLE TOOL</div>
          <h1>KNX Dashboard — Group Address Monitoring</h1>
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <button id="backBtn" class="ghost">Back</button>
          <button id="reloadBtn">Reload</button>
        </div>
      </div>
    </header>

    <main class="container">
      <div id="content" class="card">
        Loading configuration...
      </div>
    </main>

    <script>
      let lastStatus = null;

      async function loadConfigAndStatus() {
        const [cfgRes, statusRes] = await Promise.all([fetch('/api/config'), fetch('/api/status')]);
        const cfg = await cfgRes.json();
        const status = await statusRes.json();
        lastStatus = status;

        const content = document.getElementById('content');

        if (!cfg || !Array.isArray(cfg.gateways) || !cfg.gateways.length) {
          content.innerHTML = '<div style="color:#6b7280">No config found</div>';
          return;
        }

        // build a map of statuses for quick lookup
        const statusMap = new Map();
        for (const p of (status.points||[])) {
          statusMap.set(`${p.ip}__${p.ga}`, p.status);
        }

        let html = '';
        for (const gw of cfg.gateways) {
          html += `<h3 style="margin-top:0">Gateway ${gw.IPRS}</h3>`;
          html += `<table><thead><tr><th>GA</th><th>Name</th><th>Status</th></tr></thead><tbody>`;
          for (const p of gw.points) {
            const key = `${gw.IPRS}__${p.ga}`;
            const s = statusMap.has(key) ? statusMap.get(key) : null;
            let cls = 'status-err';
            let text = 'Unknown';
            if (s === 1) { cls = 'status-ok'; text = 'OK'; }
            else if (s === -1) { cls = 'status-err'; text = 'Error'; }
            else if (s === 99) { cls = 'status-err'; text = 'Timeout'; }

            html += `<tr><td>${p.ga}</td><td>${p.dst||''}</td><td><span class="${cls}">${text}</span></td></tr>`;
          }
          html += `</tbody></table><div style="height:18px"></div>`;
        }

        html += `<div style="font-size:12px;color:#9ca3af">Last update: ${status.updated || 'n/a'}</div>`;

        content.innerHTML = html;
      }

      document.getElementById('reloadBtn').addEventListener('click', loadConfigAndStatus);
      document.getElementById('backBtn').addEventListener('click', () => { window.location.href = '/index.html'; });

      loadConfigAndStatus();
      setInterval(loadConfigAndStatus, 5000);
    </script>
  </body>
</html>
